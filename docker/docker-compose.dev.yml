# ============================================================
# docker-compose.dev.yml — 개발 환경
# 실행: docker compose -f docker/docker-compose.base.yml -f docker/docker-compose.dev.yml --env-file docker/.env.dev up -d
# ============================================================
version: "3.9"

services:
  db:
    container_name: aiservice-db-dev
    ports:
      - "33060:3306"    # 로컬에서 직접 DB 접속 가능
    volumes:
      - db-data-dev:/var/lib/mysql

  app:
    container_name: aiservice-app-dev
    ports:
      - "8090:8090"     # API
      - "5005:5005"     # JVM 디버그 포트
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"

volumes:
  db-data-dev:
