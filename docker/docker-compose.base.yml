# ============================================================
# docker-compose.base.yml — 공통 서비스 정의
# 단독 실행 불가. 환경별 override 파일과 함께 사용:
#   docker compose -f docker/docker-compose.base.yml -f docker/docker-compose.dev.yml --env-file docker/.env.dev up -d
# ============================================================
version: "3.9"

services:
  db:
    image: mariadb:11.3
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: aiservice
      MYSQL_USER: aiservice
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: jdbc:mariadb://db:3306/aiservice?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: aiservice
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOAD_PATH: ${UPLOAD_PATH:-/data/uploads}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - uploads:/data/uploads

volumes:
  uploads:
