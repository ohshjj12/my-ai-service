spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:33061/aiservice?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:aiservice}
    password: ${DB_PASSWORD:test_password}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop  # 테스트마다 스키마 재생성
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

upload:
  path: ./uploads-test

logging:
  level:
    com.example.aiservice: INFO
    org.springframework.security: WARN
