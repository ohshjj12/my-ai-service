app:
  redis:
    enabled: false   # 로컬 개발 시 Redis 없이 실행 (true로 바꾸면 활성화)

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:mariadb://127.0.0.1:33060/aiservice?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: aiservice
    password: ${DB_PASSWORD:!1dpdldkdltjqltm1!}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

upload:
  path: ./uploads
# dev에서는 actuator 상세 정보 활성화
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,env,beans,mappings
logging:
  level:
    com.example.aiservice: DEBUG
    org.springframework.security: DEBUG
