spring:
  application:
    name: my-ai-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mariadb://127.0.0.1:33060/aiservice?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: org.mariadb.jdbc.Driver
    username: aiservice
    password: ${DB_PASSWORD:!1dpdldkdltjqltm1!}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true
  # Graceful Shutdown: 진행 중인 요청 완료 후 종료 (K8s SIGTERM 대응)
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

server:
  port: 8090
  # Graceful Shutdown
  shutdown: graceful
# 로컬 파일 업로드 경로
upload:
  path: ${UPLOAD_PATH:./uploads}

# JWT 설정
jwt:
  secret: ${JWT_SECRET:myMVPSecretKeyForJWT256BitsHS256AlgorithmDevelopment!}
  expiration: 3600000          # Access Token: 1시간 (ms)
  refresh-expiration: 2592000000 # Refresh Token: 30일 (ms)

# OpenAI API 설정
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  timeout:
    connect: 10   # 초
    read: 60      # 초 (Vision 분석은 오래 걸릴 수 있음)

# Actuator (헬스체크 / K8s probe)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never       # prod에서는 상세 숨김 (개별 yml에서 override)
      probes:
        enabled: true           # /actuator/health/liveness, /readiness 활성화
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
