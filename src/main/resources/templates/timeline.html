<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성장 타임라인 - AI Ultrasound</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            background: #0a0a0f; color: #e0e0e0; min-height: 100vh;
        }

        /* NAV */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 40px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .nav-logo { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #6c63ff, #48cae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 24px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        #btn-logout { padding: 7px 18px; border-radius: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #aaa; font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        #btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }

        .container { max-width: 900px; margin: 0 auto; padding: 96px 24px 60px; }

        /* HEADER */
        .page-header { margin-bottom: 36px; }
        .page-header .back-link { color: #555; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; transition: color 0.2s; }
        .page-header .back-link:hover { color: #aaa; }
        .page-title { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        .page-sub { color: #666; font-size: 0.9rem; margin-top: 6px; }

        /* PREGNANCY SELECTOR */
        .pregnancy-bar {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 32px; flex-wrap: wrap;
        }
        .pregnancy-tab {
            padding: 8px 20px; border-radius: 999px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); background: transparent;
            color: #888; font-size: 0.88rem; transition: all 0.2s;
        }
        .pregnancy-tab:hover { border-color: #6c63ff; color: #fff; }
        .pregnancy-tab.active { background: rgba(108,99,255,0.2); border-color: #6c63ff; color: #fff; }
        .btn-add-pregnancy {
            padding: 8px 20px; border-radius: 999px; cursor: pointer;
            border: 1px dashed rgba(108,99,255,0.4); background: transparent;
            color: #6c63ff; font-size: 0.88rem; transition: all 0.2s;
        }
        .btn-add-pregnancy:hover { background: rgba(108,99,255,0.1); }

        /* CURRENT WEEK CARD */
        .week-card {
            background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(72,202,228,0.08));
            border: 1px solid rgba(108,99,255,0.25);
            border-radius: 16px; padding: 28px 32px;
            margin-bottom: 32px; display: flex; gap: 32px; flex-wrap: wrap;
        }
        .week-card .week-num { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #6c63ff, #48cae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .week-card .week-label { font-size: 0.8rem; color: #666; margin-top: 4px; }
        .week-card .week-info { flex: 1; min-width: 200px; }
        .week-card .week-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }
        .week-card .week-info p { color: #777; font-size: 0.88rem; line-height: 1.7; }
        .week-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 12px; }
        .week-stat { font-size: 0.82rem; color: #555; }
        .week-stat span { color: #48cae4; font-weight: 600; }

        /* UPLOAD SHORTCUT */
        .upload-shortcut {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; border-radius: 12px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
            margin-bottom: 32px;
        }
        .upload-shortcut p { font-size: 0.9rem; color: #888; }
        .upload-shortcut p strong { color: #ccc; }
        .btn-upload-now {
            padding: 9px 22px; border-radius: 8px;
            background: linear-gradient(135deg, #6c63ff, #48cae4);
            border: none; color: #fff; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; text-decoration: none; white-space: nowrap;
            transition: opacity 0.2s;
        }
        .btn-upload-now:hover { opacity: 0.85; }

        /* TIMELINE */
        .timeline { position: relative; }
        .timeline::before {
            content: ''; position: absolute; left: 28px; top: 0; bottom: 0;
            width: 2px; background: linear-gradient(to bottom, #6c63ff33, #48cae422);
        }
        .timeline-item {
            display: flex; gap: 24px; margin-bottom: 28px; position: relative;
        }
        .timeline-dot {
            width: 58px; height: 58px; border-radius: 50%; flex-shrink: 0;
            background: rgba(108,99,255,0.15); border: 2px solid rgba(108,99,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; color: #6c63ff;
            z-index: 1; position: relative;
        }
        .timeline-dot.done { background: rgba(72,202,228,0.15); border-color: rgba(72,202,228,0.4); color: #48cae4; }
        .timeline-dot.failed { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.3); color: #ff6b6b; }
        .timeline-body {
            flex: 1; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 20px 24px;
            transition: border-color 0.2s;
        }
        .timeline-body:hover { border-color: rgba(108,99,255,0.3); }
        .timeline-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
        .timeline-filename { font-size: 0.9rem; font-weight: 500; color: #ccc; }
        .timeline-date { font-size: 0.78rem; color: #555; flex-shrink: 0; }
        .timeline-result { margin-top: 14px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .gender-badge {
            padding: 5px 14px; border-radius: 999px; font-size: 0.82rem; font-weight: 700;
        }
        .gender-male { background: rgba(108,99,255,0.2); color: #a29bfe; }
        .gender-female { background: rgba(255,139,171,0.2); color: #ff8fab; }
        .gender-unknown { background: rgba(255,255,255,0.05); color: #666; }
        .confidence-bar-wrap { flex: 1; min-width: 100px; }
        .confidence-label { font-size: 0.75rem; color: #555; margin-bottom: 4px; }
        .confidence-bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
        .confidence-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #6c63ff, #48cae4); transition: width 0.6s ease; }
        .report-text { margin-top: 12px; font-size: 0.84rem; color: #666; line-height: 1.7; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 3px solid rgba(108,99,255,0.3); }
        .timeline-baby-info { margin-top: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
        .baby-stat { font-size: 0.78rem; color: #555; }
        .baby-stat span { color: #48cae4; font-weight: 600; }
        .status-pending { font-size: 0.8rem; color: #ffa500; display: flex; align-items: center; gap: 6px; margin-top: 10px; }

        /* EMPTY STATE */
        .empty-timeline { text-align: center; padding: 60px 24px; }
        .empty-timeline .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-timeline p { color: #555; font-size: 0.9rem; line-height: 1.7; }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: #13131a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 32px; width: 100%; max-width: 420px;
            margin: 0 20px;
        }
        .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
        .modal .field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .modal .field-group label { font-size: 0.82rem; color: #888; }
        .modal .field-group input {
            padding: 11px 16px; border-radius: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0; font-size: 0.95rem; outline: none;
        }
        .modal .field-group input:focus { border-color: #6c63ff; }
        .modal-btns { display: flex; gap: 10px; margin-top: 8px; }
        .btn-modal-cancel { flex: 1; padding: 11px; border-radius: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888; cursor: pointer; font-size: 0.95rem; }
        .btn-modal-submit { flex: 2; padding: 11px; border-radius: 10px; background: linear-gradient(135deg, #6c63ff, #48cae4); border: none; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .modal-msg { font-size: 0.82rem; color: #ff6b6b; min-height: 18px; margin-top: 6px; }

        /* TOAST */
        #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); padding: 12px 24px; border-radius: 10px; background: rgba(30,30,40,0.95); border: 1px solid rgba(255,255,255,0.1); font-size: 0.88rem; color: #e0e0e0; transition: transform 0.3s ease; z-index: 999; backdrop-filter: blur(8px); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.toast-error { border-color: rgba(255,107,107,0.4); color: #ff6b6b; }
        #toast.toast-success { border-color: rgba(72,202,228,0.4); color: #48cae4; }

        @media (max-width: 600px) {
            nav { padding: 14px 20px; }
            .nav-links a:not(#btn-logout) { display: none; }
            .container { padding: 80px 16px 40px; }
            .week-card { padding: 20px; }
            .timeline::before { left: 22px; }
            .timeline-dot { width: 46px; height: 46px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">✦ AI Ultrasound</a>
    <div class="nav-links">
        <a href="/app">분석하기</a>
        <a href="/timeline" class="active">타임라인</a>
        <button id="btn-logout">로그아웃</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <a href="/app" class="back-link">← 분석 페이지로</a>
        <div class="page-title">성장 타임라인</div>
        <div class="page-sub" id="page-sub-text">임신 정보를 등록하고 초음파 기록을 관리하세요.</div>
    </div>

    <!-- 임신 탭 -->
    <div class="pregnancy-bar" id="pregnancy-bar">
        <button class="btn-add-pregnancy" onclick="openModal()">+ 임신 등록</button>
    </div>

    <!-- 현재 주차 정보 -->
    <div class="week-card" id="week-card" style="display:none">
        <div>
            <div class="week-num" id="week-num">-</div>
            <div class="week-label">주차</div>
        </div>
        <div class="week-info">
            <h3 id="week-title">-</h3>
            <p id="week-desc">-</p>
            <div class="week-stats">
                <div class="week-stat">키 <span id="week-height">-</span></div>
                <div class="week-stat">몸무게 <span id="week-weight">-</span></div>
                <div class="week-stat">출산예정일 <span id="due-date">-</span></div>
            </div>
        </div>
    </div>

    <!-- 업로드 바로가기 -->
    <div class="upload-shortcut" id="upload-shortcut" style="display:none">
        <p>새 초음파 이미지를 <strong>업로드</strong>하고 AI 분석을 받아보세요.</p>
        <a href="/app" class="btn-upload-now">📤 업로드하기</a>
    </div>

    <!-- 타임라인 -->
    <div class="timeline" id="timeline-wrap">
        <div class="empty-timeline">
            <div class="empty-icon">🤰</div>
            <p>임신 정보를 먼저 등록해주세요.<br>등록 후 초음파 이미지를 업로드하면 타임라인이 만들어집니다.</p>
        </div>
    </div>
</div>

<!-- 임신 등록 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
    <div class="modal">
        <h3>🤰 임신 정보 등록</h3>
        <div class="field-group">
            <label>태명 (닉네임)</label>
            <input type="text" id="input-nickname" placeholder="예: 콩이, 아기별">
        </div>
        <div class="field-group">
            <label>출산 예정일</label>
            <input type="date" id="input-duedate">
        </div>
        <div class="modal-msg" id="modal-msg"></div>
        <div class="modal-btns">
            <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
            <button class="btn-modal-submit" onclick="submitPregnancy()">등록하기</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const accessToken = localStorage.getItem('accessToken') || '';
    let pregnancies = [];
    let currentPregnancyId = null;

    // ── 초기화 ─────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        if (!accessToken) {
            location.href = '/app';
            return;
        }
        loadPregnancies();
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
        try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken } }); } catch(_) {}
        localStorage.removeItem('accessToken');
        localStorage.removeItem('username');
        location.href = '/app';
    });

    // ── 임신 목록 로드 ──────────────────────────────────────
    async function loadPregnancies() {
        try {
            const res = await fetch('/api/pregnancies', { headers: { 'Authorization': 'Bearer ' + accessToken } });
            if (res.status === 401) { location.href = '/app'; return; }
            const data = await res.json();
            pregnancies = data.success ? data.data : [];
            renderPregnancyTabs();
            if (pregnancies.length > 0) {
                selectPregnancy(pregnancies[0].id);
            }
        } catch(e) {
            showToast('임신 정보를 불러오지 못했습니다.', 'error');
        }
    }

    function renderPregnancyTabs() {
        const bar = document.getElementById('pregnancy-bar');
        bar.innerHTML = '';
        pregnancies.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'pregnancy-tab' + (p.id === currentPregnancyId ? ' active' : '');
            btn.textContent = `${p.nickname} (${p.dueDate})`;
            btn.onclick = () => selectPregnancy(p.id);
            bar.appendChild(btn);
        });
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-pregnancy';
        addBtn.textContent = '+ 임신 등록';
        addBtn.onclick = openModal;
        bar.appendChild(addBtn);
    }

    // ── 임신 선택 & 타임라인 로드 ───────────────────────────
    async function selectPregnancy(id) {
        currentPregnancyId = id;
        renderPregnancyTabs();
        try {
            const res = await fetch(`/api/pregnancies/${id}/timeline`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            if (res.status === 401) { location.href = '/app'; return; }
            const data = await res.json();
            if (data.success) renderTimeline(data.data);
        } catch(e) {
            showToast('타임라인을 불러오지 못했습니다.', 'error');
        }
    }

    function renderTimeline(tl) {
        const p = pregnancies.find(x => x.id === currentPregnancyId);

        // 현재 주차 카드
        const wi = tl.currentWeekInfo;
        if (wi) {
            document.getElementById('week-card').style.display = 'flex';
            document.getElementById('week-num').textContent = wi.week || '-';
            document.getElementById('week-title').textContent = wi.title || `${wi.week}주차`;
            document.getElementById('week-desc').textContent = wi.description || '';
            document.getElementById('week-height').textContent = wi.lengthCm ? wi.lengthCm + 'cm' : '-';
            document.getElementById('week-weight').textContent = wi.weightG ? wi.weightG + 'g' : '-';
            document.getElementById('due-date').textContent = p ? p.dueDate : '-';
        }

        document.getElementById('upload-shortcut').style.display = 'flex';

        // 타임라인 아이템
        const wrap = document.getElementById('timeline-wrap');
        const items = tl.items || [];
        if (items.length === 0) {
            wrap.innerHTML = `<div class="empty-timeline">
                <div class="empty-icon">📷</div>
                <p>아직 업로드된 초음파 이미지가 없습니다.<br><a href="/app" style="color:#6c63ff">이미지를 업로드</a>하면 타임라인이 생성됩니다.</p>
            </div>`;
            return;
        }

        wrap.innerHTML = items.map(item => {
            const week = item.weekNumber ? `${item.weekNumber}주` : '?주';
            const status = item.analysisStatus;
            const isDone = status === 'DONE' || status === 'COMPLETED';
            const isFailed = status === 'FAILED';
            const date = item.uploadedAt ? new Date(item.uploadedAt).toLocaleDateString('ko-KR') : '-';

            let genderHtml = '';
            if (isDone && item.predictedGender) {
                const cls = item.predictedGender === 'MALE' ? 'gender-male' : item.predictedGender === 'FEMALE' ? 'gender-female' : 'gender-unknown';
                const label = item.predictedGender === 'MALE' ? '♂ 남아 예측' : item.predictedGender === 'FEMALE' ? '♀ 여아 예측' : '판별 불가';
                const conf = item.confidenceScore != null ? (item.confidenceScore * 100).toFixed(1) : null;
                genderHtml = `
                    <div class="timeline-result">
                        <span class="gender-badge ${cls}">${label}</span>
                        ${conf ? `<div class="confidence-bar-wrap">
                            <div class="confidence-label">신뢰도 ${conf}%</div>
                            <div class="confidence-bar"><div class="confidence-fill" style="width:${conf}%"></div></div>
                        </div>` : ''}
                    </div>`;
            } else if (isFailed) {
                genderHtml = `<div class="status-pending">✗ 분석 실패</div>`;
            } else {
                genderHtml = `<div class="status-pending">⟳ 분석 대기 중...</div>`;
            }

            const reportHtml = item.reportText && isDone
                ? `<div class="report-text">${item.reportText}</div>` : '';

            const babyInfo = item.babyInfo;
            const babyHtml = babyInfo ? `<div class="timeline-baby-info">
                ${babyInfo.lengthCm ? `<div class="baby-stat">키 <span>${babyInfo.lengthCm}cm</span></div>` : ''}
                ${babyInfo.weightG ? `<div class="baby-stat">몸무게 <span>${babyInfo.weightG}g</span></div>` : ''}
                ${babyInfo.title ? `<div class="baby-stat">발달 <span>${babyInfo.title}</span></div>` : ''}
            </div>` : '';

            const dotClass = isDone ? 'done' : isFailed ? 'failed' : '';
            return `
                <div class="timeline-item">
                    <div class="timeline-dot ${dotClass}">${week}</div>
                    <div class="timeline-body">
                        <div class="timeline-top">
                            <div class="timeline-filename">📄 ${item.originalFileName || '이미지'}</div>
                            <div class="timeline-date">${date}</div>
                        </div>
                        ${genderHtml}
                        ${reportHtml}
                        ${babyHtml}
                    </div>
                </div>`;
        }).join('');
    }

    // ── 임신 등록 ────────────────────────────────────────────
    function openModal() {
        document.getElementById('modal').classList.add('visible');
        document.getElementById('modal-msg').textContent = '';
        document.getElementById('input-nickname').value = '';
        document.getElementById('input-duedate').value = '';
    }
    function closeModal() { document.getElementById('modal').classList.remove('visible'); }
    function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

    async function submitPregnancy() {
        const nickname = document.getElementById('input-nickname').value.trim();
        const dueDate = document.getElementById('input-duedate').value;
        const msg = document.getElementById('modal-msg');
        if (!nickname || !dueDate) { msg.textContent = '모든 항목을 입력해주세요.'; return; }

        try {
            const res = await fetch('/api/pregnancies', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, dueDate })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                closeModal();
                showToast('임신 정보 등록 완료!', 'success');
                await loadPregnancies();
                selectPregnancy(data.data.id);
            } else {
                msg.textContent = data.message || '등록 실패';
            }
        } catch(e) {
            msg.textContent = '서버 연결 오류';
        }
    }

    // ── 유틸 ─────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show' + (type ? ' toast-' + type : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.className = '', 3000);
    }
</script>
</body>
</html>
